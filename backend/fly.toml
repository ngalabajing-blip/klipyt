# Fly.io deployment config.
# Set `app = "<your-unique-name>"` via `fly launch --copy-config` or edit before
# the first `fly deploy`.
app = "mager-klip-api"
primary_region = "sin"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  # faster-whisper cache lives on the worker volume so models persist across
  # deploys; harmless on the app machine.
  XDG_CACHE_HOME = "/app/storage/.cache"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker = "python -m app.workers.queue"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]
  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

# App machine: small, just serves HTTP.
[[vm]]
  processes = ["app"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Worker machine: bigger, runs ffmpeg + faster-whisper + MiMo calls.
[[vm]]
  processes = ["worker"]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048

# Persistent volume for whisper model cache + per-job scratch dir on the
# worker. No volume needed on the app machine.
[[mounts]]
  source = "mager_storage"
  destination = "/app/storage"
  processes = ["worker"]
